name: love_time
description: "A Days Since app inspired by Apple's design."
publish_to: 'none'
version: 1.1.0+1

environment:
  sdk: ^3.11.1

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  flutter_riverpod: ^2.5.1
  shared_preferences: ^2.2.3
  google_fonts: ^6.2.1
  intl: ^0.19.0
  uuid: ^4.4.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.14.3

flutter_launcher_icons:
  android: true
  ios: false
  image_path: "assets/icon/icon.png"
  min_sdk_android: 21
  adaptive_icon_background: "#FF9500"
  adaptive_icon_foreground: "assets/icon/icon.png"

flutter:
  uses-material-design: true
  # assets:
  #   - assets/images/  # 有木纹图片时取消注释
