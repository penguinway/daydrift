name: Release

on:
  push:
    tags: [ 'v*.*.*' ]

jobs:
  release:
    name: Build & Release
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.41.4'
          channel: stable
          cache: true

      - name: Get dependencies
        run: flutter pub get

      - name: Analyze
        run: flutter analyze

      - name: Run tests
        run: flutter test

      - name: Build split APKs
        run: flutter build apk --release --split-per-abi

      - name: Get tag version
        id: tag
        run: echo "version=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: 时光 ${{ steps.tag.outputs.version }}
          body: |
            ## 时光 · DayDrift ${{ steps.tag.outputs.version }}

            ### 安装说明
            - **现代手机（推荐）**：下载 `app-arm64-v8a-release.apk`
            - **旧款手机**：下载 `app-armeabi-v7a-release.apk`

            ### 更新内容
            > 请查看 [提交记录](https://github.com/${{ github.repository }}/commits/${{ steps.tag.outputs.version }})
          files: |
            build/app/outputs/flutter-apk/app-arm64-v8a-release.apk
            build/app/outputs/flutter-apk/app-armeabi-v7a-release.apk
          draft: false
          prerelease: false
