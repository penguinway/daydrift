<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <defs>
    <linearGradient id="woodBg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%"   stop-color="#EDD090"/>
      <stop offset="30%"  stop-color="#D4A850"/>
      <stop offset="65%"  stop-color="#C09040"/>
      <stop offset="100%" stop-color="#B07830"/>
    </linearGradient>
    <linearGradient id="orangeHdr" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%"   stop-color="#FFAA00"/>
      <stop offset="100%" stop-color="#FF7700"/>
    </linearGradient>
    <filter id="cardShadow" x="-10%" y="-10%" width="120%" height="130%">
      <feDropShadow dx="0" dy="10" stdDeviation="22" flood-color="#00000033"/>
    </filter>
  </defs>

  <!-- 木纹背景 -->
  <rect width="1024" height="1024" rx="224" fill="url(#woodBg)"/>

  <!-- 木纹线条（水平波浪） -->
  <g stroke="#C08030" stroke-opacity="0.18" stroke-width="3" fill="none">
    <path d="M0 140 Q256 128 512 144 T1024 138"/>
    <path d="M0 210 Q200 200 512 216 T1024 208"/>
    <path d="M0 290 Q300 278 512 294 T1024 288"/>
    <path d="M0 370 Q180 360 512 374 T1024 368"/>
    <path d="M0 460 Q260 450 512 464 T1024 458"/>
    <path d="M0 550 Q220 538 512 554 T1024 548"/>
    <path d="M0 640 Q290 630 512 644 T1024 638"/>
    <path d="M0 730 Q240 720 512 734 T1024 728"/>
    <path d="M0 820 Q270 810 512 824 T1024 818"/>
    <path d="M0 900 Q200 890 512 904 T1024 898"/>
  </g>
  <g stroke="#F0D890" stroke-opacity="0.2" stroke-width="1.5" fill="none">
    <path d="M0 175 Q340 163 512 179 T1024 173"/>
    <path d="M0 330 Q310 318 512 334 T1024 328"/>
    <path d="M0 505 Q280 493 512 509 T1024 503"/>
    <path d="M0 685 Q320 673 512 689 T1024 683"/>
    <path d="M0 860 Q290 848 512 864 T1024 858"/>
  </g>

  <!-- 卡片主体 -->
  <rect x="148" y="172" width="728" height="680" rx="72" fill="white" filter="url(#cardShadow)" opacity="0.96"/>

  <!-- 橙色顶栏（上圆角） -->
  <path d="M148 244 Q148 172 220 172 L804 172 Q876 172 876 244 L876 356 L148 356 Z" fill="url(#orangeHdr)"/>

  <!-- 顶栏"时光"文字 -->
  <text x="512" y="292"
        text-anchor="middle"
        dominant-baseline="middle"
        font-family="serif"
        font-size="108"
        font-weight="700"
        fill="white"
        letter-spacing="8">时光</text>

  <!-- 顶栏副标题 -->
  <text x="512" y="340"
        text-anchor="middle"
        dominant-baseline="middle"
        font-family="sans-serif"
        font-size="38"
        font-weight="400"
        fill="rgba(255,255,255,0.75)"
        letter-spacing="4">DAYS SINCE</text>

  <!-- 主体区域：大数字 -->
  <text x="512" y="600"
        text-anchor="middle"
        dominant-baseline="middle"
        font-family="sans-serif"
        font-size="300"
        font-weight="900"
        fill="#1C1C1E">365</text>

  <!-- 分隔线 -->
  <line x1="180" y1="730" x2="844" y2="730" stroke="#EEEEEE" stroke-width="2"/>

  <!-- 底部"天"标签 -->
  <text x="512" y="790"
        text-anchor="middle"
        dominant-baseline="middle"
        font-family="sans-serif"
        font-size="64"
        font-weight="400"
        fill="#AAAAAA">天</text>
</svg>
